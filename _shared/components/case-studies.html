<!-- ═══ CASE STUDIES ═══ -->
 <style>
  .fio-section-header{text-align:center;max-width:680px;margin:0 auto 52px}
.fio-section-header h2{
  font-family:var(--font-display);font-size:clamp(26px,3.5vw,40px);
  font-weight:800;margin-bottom:12px;
}
.fio-section-header p{font-size:16px;color:var(--gray-500);line-height:1.75}
  /* ── Use Cases ── */
.fio-usecases{padding:80px 0;background:var(--gray-50)}
.fio-usecases-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.fio-usecase{
  display:flex;align-items:flex-start;gap:16px;
  background:#fff;border:1px solid var(--gray-200);
  border-radius:var(--radius-lg);padding:22px 20px;
  transition:all .25s;
}
.fio-usecase:hover{
  border-color:rgba(92,108,255,.3);box-shadow:var(--shadow-md);transform:translateX(4px);
}
.fio-usecase-icon{
  width:44px;height:44px;border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  background:linear-gradient(135deg,#eef0ff,#dde1ff);
}
.fio-usecase-text h4{font-size:15px;font-weight:700;margin-bottom:4px}
.fio-usecase-text p{font-size:13px;color:var(--gray-500);line-height:1.65}

/* ── Case Studies ── */
.fio-cs{padding:80px 0;background:#fff}
.fio-cs-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:40px;
}
.fio-cs-card{
  background:#fff;border:1px solid var(--gray-200);
  border-radius:var(--radius-xl);overflow:hidden;
  transition:all .35s;display:flex;flex-direction:column;
}
.fio-cs-card:hover{
  transform:translateY(-6px);box-shadow:var(--shadow-xl);border-color:transparent;
}
.fio-cs-img{
  width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--gray-100);
}
.fio-cs-body{padding:16px;flex:1;display:flex;flex-direction:column}
.fio-cs-cat{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--green-700);margin-bottom:6px;
}
.fio-cs-card h3{
  font-family:var(--font-display);font-size:14px;font-weight:800;
  margin-bottom:6px;line-height:1.4;
}
.fio-cs-card p{font-size:12px;color:var(--gray-500);line-height:1.6;flex:1}
.fio-cs-link{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:16px;font-size:13px;font-weight:700;
  color:var(--green-700);transition:gap .2s;
}
.fio-cs-card:hover .fio-cs-link{gap:10px}

.fio-cs-cta{text-align:center}
.fio-btn-more{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 36px;border-radius:var(--radius-full);
  font-size:15px;font-weight:700;font-family:var(--font-body);
  background:#fff;color:var(--dark);
  border:2px solid var(--gray-200);transition:all .25s;cursor:pointer;
}
.fio-btn-more:hover{
  border-color:var(--green-600);color:var(--green-700);
  transform:translateY(-2px);box-shadow:var(--shadow-md);
}
 </style>
<section class="fio-usecases">
  <div class="container">
    <div class="fio-section-header">
      <div class="section-label">Case Studies</div>
      <h2>Real Results From Real Projects</h2>
      <p>See how we've transformed business workflows with automation — across industries, tools, and use cases.</p>
    </div>
    <div class="fio-cs-grid" id="cs-grid">
      <!-- Populated by JS -->
    </div>
    <div class="fio-cs-cta">
      <a href="https://growwstacks.com/case-studies/" target="_blank" rel="noopener noreferrer" class="fio-btn-more">
        View All Case Studies
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</section>
<script>
    /* ── Case Studies — pick 12 random from CS_CARDS (case-studies-data.js) ── */
!function(){
  if(typeof CS_CARDS==='undefined'||!CS_CARDS.length){
    console.warn('CS_CARDS not loaded — check case-studies-data.js path');
    return;
  }
  var grid=document.getElementById('cs-grid');
  if(!grid)return;
  /* Shuffle and pick 12 */
  var shuffled=CS_CARDS.slice().sort(function(){return Math.random()-.5});
  var picked=shuffled.slice(0,12);
  picked.forEach(function(cs){
    var a=document.createElement('a');
    a.href=cs.href;a.target='_blank';a.rel='noopener noreferrer';a.className='fio-cs-card';
    /* Add ImageKit transform for optimized loading */
    var imgSrc=cs.img;
    if(imgSrc.indexOf('ik.imagekit.io')!==-1&&imgSrc.indexOf('tr=')===-1){
      imgSrc+=imgSrc.indexOf('?')!==-1?'&tr=w-320,h-180,q-80,f-auto':'?tr=w-320,h-180,q-80,f-auto';
    }
    a.innerHTML='<img class="fio-cs-img" src="'+imgSrc+'" alt="'+cs.imgAlt+'" width="320" height="180" loading="lazy">'
      +'<div class="fio-cs-body">'
      +'<div class="fio-cs-cat">'+cs.tag+' · '+cs.meta+'</div>'
      +'<h3>'+cs.title+'</h3>'
      +'<p>'+cs.desc+'</p>'
      +'<span class="fio-cs-link">View case study →</span>'
      +'</div>';
    grid.appendChild(a);
  });
  /* Scroll fade-in */
  if('IntersectionObserver' in window){
    var cards=grid.querySelectorAll('.fio-cs-card');
    cards.forEach(function(c,i){
      c.style.opacity='0';c.style.transform='translateY(20px)';
      c.style.transition='opacity .45s ease '+(i*80)+'ms,transform .45s ease '+(i*80)+'ms';
    });
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';obs.unobserve(e.target);}
      });
    },{threshold:.1});
    cards.forEach(function(c){obs.observe(c)});
  }
}();
</script>
