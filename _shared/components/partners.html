<!-- ═══ CREDENTIALS STRIP — "Certified & partnered with" · Claude design ═══
     Scoped + self-contained under .gs-creds-ds. Tokens defined locally so this
     component depends on nothing in global.css. Ported from the GrowwStacks
     refined design system (Credentials strip, one row, five badges). -->
<style>
.gs-creds-ds{
  --paper:#fff;--fg:#0e1512;--fg-subtle:#8b958e;
  --line:rgba(14,21,18,.10);--r-md:10px;
  --dsf-body:'Plus Jakarta Sans',system-ui,sans-serif;
  --dsf-mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  background:var(--paper);padding:34px 0;font-family:var(--dsf-body)
}
.gs-creds-ds .creds-row{display:flex;align-items:center;gap:30px;flex-wrap:wrap;justify-content:center}
.gs-creds-ds .creds-label{font-family:var(--dsf-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-subtle)}
.gs-creds-ds .creds-badges{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.gs-creds-ds .cred{display:flex;align-items:center;gap:10px;padding:11px 16px;border:1px solid var(--line);border-radius:var(--r-md);background:var(--paper)}
.gs-creds-ds .cred img{width:22px;height:22px;object-fit:contain;border-radius:4px}
.gs-creds-ds .cred b{font-size:13.5px;font-weight:700;color:var(--fg);display:block;line-height:1.2;white-space:nowrap}
.gs-creds-ds .cred span{font-family:var(--dsf-mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-subtle);white-space:nowrap}
@media(max-width:560px){.gs-creds-ds .creds-row{gap:18px}.gs-creds-ds .cred{padding:9px 13px}}
</style>
<section class="gs-creds-ds">
  <div class="container">
    <div class="creds-row">
      <span class="creds-label">Certified &amp; partnered with</span>
      <div class="creds-badges">
        <div class="cred">
          <img src="https://www.google.com/s2/favicons?domain=anthropic.com&amp;sz=64" alt="Anthropic" loading="lazy" width="22" height="22" />
          <div><b>Anthropic</b><span>Services Partner</span></div>
        </div>
        <div class="cred">
          <img src="https://www.google.com/s2/favicons?domain=make.com&amp;sz=64" alt="Make.com" loading="lazy" width="22" height="22" />
          <div><b>Make.com</b><span>Platinum Partner</span></div>
        </div>
        <div class="cred">
          <img src="https://www.google.com/s2/favicons?domain=upwork.com&amp;sz=64" alt="Upwork" loading="lazy" width="22" height="22" />
          <div><b>Upwork</b><span>Top Rated Plus</span></div>
        </div>
        <div class="cred">
          <img src="https://www.google.com/s2/favicons?domain=n8n.io&amp;sz=64" alt="n8n" loading="lazy" width="22" height="22" />
          <div><b>n8n</b><span>Integration Partner</span></div>
        </div>
        <div class="cred">
          <img src="https://www.google.com/s2/favicons?domain=microsoft.com&amp;sz=64" alt="Microsoft" loading="lazy" width="22" height="22" />
          <div><b>Microsoft</b><span>Partner</span></div>
        </div>
      </div>
    </div>
  </div>
</section>
