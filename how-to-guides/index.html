<!-- Make.com Purple Theme -->
<style>
:root {
  --mk-primary: #6D00CC;
  --mk-primary-hover: #5A00A8;
  --mk-primary-light: #EDE5FF;
  --mk-primary-pale: #F8F5FF;
  --mk-accent: #CB2BD5;
  --mk-bg: #FAFAFC;
  --mk-card-bg: #ffffff;
  --mk-border: #E5E0EE;
  --mk-text: #1A1134;
  --mk-text-muted: #6B6580;
  --mk-text-light: #9189A3;
  --font-body: 'Plus Jakarta Sans', sans-serif;
  --font-display: 'Bricolage Grotesque', serif;
}

/* ═══ HERO ═══ */
.guides-hero {
  padding: 80px 24px 48px;
  text-align: center;
  background: linear-gradient(180deg, var(--mk-primary-light) 0%, var(--mk-bg) 100%);
  position: relative;
  overflow: hidden;
}
.guides-hero::before {
  content: '';
  position: absolute;
  top: -120px;
  right: -80px;
  width: 450px;
  height: 450px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(109,0,204,.07) 0%, transparent 70%);
  pointer-events: none;
}
.guides-hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -60px;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(203,43,213,.05) 0%, transparent 70%);
  pointer-events: none;
}
.guides-hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--mk-primary);
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}
.guides-hero h1 {
  font-family: var(--font-display);
  font-size: clamp(28px, 4.5vw, 48px);
  font-weight: 800;
  color: var(--mk-text);
  margin: 0 0 14px;
  line-height: 1.15;
  position: relative;
  z-index: 1;
}
.guides-hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--mk-primary), var(--mk-accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.guides-hero p {
  font-size: 17px;
  color: var(--mk-text-muted);
  max-width: 580px;
  margin: 0 auto 32px;
  line-height: 1.65;
  position: relative;
  z-index: 1;
}

/* Search */
.guides-search-wrap {
  max-width: 540px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.guides-search-wrap svg {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--mk-text-light);
}
.guides-search {
  width: 100%;
  padding: 14px 16px 14px 46px;
  border: 1px solid var(--mk-border);
  border-radius: 12px;
  font-size: 15px;
  font-family: var(--font-body);
  background: var(--mk-card-bg);
  color: var(--mk-text);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.guides-search:focus {
  border-color: var(--mk-primary);
  box-shadow: 0 0 0 3px rgba(109,0,204,.1), 0 2px 8px rgba(0,0,0,.04);
}

/* ═══ FEATURED GUIDE ═══ */
.guides-featured {
  padding: 0 24px 48px;
  background: var(--mk-bg);
}
.guides-featured-inner {
  max-width: 1200px;
  margin: 0 auto;
}
.guides-featured-card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  background: var(--mk-card-bg);
  border: 1px solid var(--mk-border);
  border-radius: 16px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: box-shadow .25s, border-color .25s;
}
.guides-featured-card:hover {
  box-shadow: 0 12px 40px rgba(109,0,204,.1);
  border-color: rgba(109,0,204,.25);
}
.guides-featured-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  min-height: 280px;
  background: var(--mk-primary-pale);
}
.guides-featured-body {
  padding: 36px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.guides-featured-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--mk-primary);
  background: var(--mk-primary-light);
  padding: 4px 12px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 16px;
  width: fit-content;
}
.guides-featured-body h2 {
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 2.5vw, 1.6rem);
  font-weight: 800;
  color: var(--mk-text);
  margin: 0 0 12px;
  line-height: 1.25;
}
.guides-featured-body p {
  font-size: 15px;
  color: var(--mk-text-muted);
  line-height: 1.7;
  margin: 0 0 20px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.guides-featured-link {
  font-size: 14px;
  font-weight: 700;
  color: var(--mk-primary);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: gap .15s;
}
.guides-featured-card:hover .guides-featured-link { gap: 10px; }
.guides-featured-link svg { width: 16px; height: 16px; }

/* ═══ GRID SECTION ═══ */
.guides-section {
  padding: 48px 24px 80px;
  background: var(--mk-bg);
}
.guides-inner {
  max-width: 1200px;
  margin: 0 auto;
}
.guides-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.guides-section-title {
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 2.5vw, 1.5rem);
  font-weight: 800;
  color: var(--mk-text);
  margin: 0;
}
.guides-results {
  font-size: 14px;
  color: var(--mk-text-light);
}

.guides-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

/* ═══ GUIDE CARD ═══ */
.guide-card {
  display: flex;
  flex-direction: column;
  background: var(--mk-card-bg);
  border: 1px solid var(--mk-border);
  border-radius: 12px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: transform .2s, box-shadow .2s, border-color .2s;
}
.guide-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(109,0,204,.1);
  border-color: var(--mk-primary);
}
.guide-card-img-wrap {
  position: relative;
  overflow: hidden;
  background: var(--mk-primary-pale);
}
.guide-card-img {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
  display: block;
  transition: transform .3s;
}
.guide-card:hover .guide-card-img { transform: scale(1.03); }
.guide-card-body {
  padding: 14px 16px 18px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.guide-card-meta {
  font-size: 12px;
  color: var(--mk-text-light);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.guide-card-meta-dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--mk-text-light);
  flex-shrink: 0;
}
.guide-card-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.35;
  color: var(--mk-text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin: 0 0 10px;
  flex: 1;
  transition: color .15s;
}
.guide-card:hover .guide-card-title { color: var(--mk-primary); }
.guide-card-read {
  font-size: 13px;
  font-weight: 600;
  color: var(--mk-primary);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: auto;
  transition: gap .15s;
}
.guide-card:hover .guide-card-read { gap: 8px; }
.guide-card-read svg { width: 14px; height: 14px; }

/* ═══ SHOW MORE ═══ */
.guides-more-wrap {
  text-align: center;
  margin-top: 36px;
}
.guides-more-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 36px;
  background: var(--mk-primary);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.guides-more-btn:hover {
  background: var(--mk-primary-hover);
  transform: translateY(-1px);
}
.guides-more-btn:disabled { opacity: .5; cursor: default; transform: none; }
.guides-more-btn svg { width: 16px; height: 16px; }

/* ═══ EMPTY STATE ═══ */
.guides-empty {
  text-align: center;
  padding: 56px 24px;
  color: var(--mk-text-light);
  font-size: 15px;
  grid-column: 1 / -1;
}
.guides-empty svg {
  width: 48px; height: 48px; margin-bottom: 12px; opacity: .35;
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 1024px) {
  .guides-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
  .guides-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .guides-featured-card { grid-template-columns: 1fr; }
  .guides-featured-img { min-height: 200px; }
  .guides-featured-body { padding: 24px; }
  .guides-section { padding: 32px 24px 64px; }
}
@media (max-width: 480px) {
  .guides-grid { grid-template-columns: 1fr; }
  .guide-card-title { font-size: 14px; }
  .guides-hero { padding: 100px 16px 36px; }
}
</style>

<!-- ═══ HERO ═══ -->
<section class="guides-hero">
  <span class="guides-hero-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
    How-To Guides
  </span>
  <h1>Make.com Tutorials That<br><em>Actually Work</em></h1>
  <p>Step-by-step guides on Make.com automation scenarios — from AI agents and email workflows to CRM integrations and eCommerce automation.</p>
  <div class="guides-search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607z"/></svg>
    <input type="text" class="guides-search" id="guidesSearch" placeholder="Search guides — Gmail, Shopify, AI agent, HubSpot, Slack..." aria-label="Search Make.com guides">
  </div>
</section>

<!-- ═══ FEATURED GUIDE ═══ -->
<section class="guides-featured" id="featuredSection">
  <div class="guides-featured-inner">
    <a class="guides-featured-card" id="featuredCard" href="#" target="_blank" rel="noopener"></a>
  </div>
</section>

<!-- ═══ ALL GUIDES ═══ -->
<section class="guides-section">
  <div class="guides-inner">
    <div class="guides-section-header">
      <h2 class="guides-section-title" id="sectionTitle">All Guides</h2>
      <span class="guides-results" id="guidesResults"></span>
    </div>
    <div class="guides-grid" id="guidesGrid"></div>
    <div class="guides-more-wrap" id="guidesMoreWrap">
      <button class="guides-more-btn" id="guidesMoreBtn" aria-label="Show more guides">
        Show More Guides
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
      </button>
    </div>
  </div>
</section>

<!-- Footer -->
<div id="gs-footer"></div>

<!-- Shared Scripts -->
<script src="../_shared/site-config.js"></script>
<script src="../assets/js/images-helper.js"></script>
<script src="../_shared/page-builder.js"></script>

<!-- Guide Data -->
<script src="/how-to-guides/guides.js"></script>

<script>
(function() {
  'use strict';

  var PER_PAGE = 12;
  var visible = 0;
  var filtered = [];

  var grid = document.getElementById('guidesGrid');
  var moreBtn = document.getElementById('guidesMoreBtn');
  var moreWrap = document.getElementById('guidesMoreWrap');
  var resultsEl = document.getElementById('guidesResults');
  var searchInput = document.getElementById('guidesSearch');
  var featuredSection = document.getElementById('featuredSection');
  var featuredCard = document.getElementById('featuredCard');
  var sectionTitle = document.getElementById('sectionTitle');

  var arrowSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

  /* ── Render featured (first item) ── */
  function renderFeatured() {
    if (!ALL_WORKFLOWS || !ALL_WORKFLOWS.length) { featuredSection.style.display = 'none'; return; }
    var f = ALL_WORKFLOWS[0];
    featuredCard.href = f.u;
    featuredCard.innerHTML =
      '<img class="guides-featured-img" src="' + f.i + '?tr=w-600,h-380,q-80" alt="' + esc(f.t) + ' — Make.com Guide" width="600" height="380" loading="eager">' +
      '<div class="guides-featured-body">' +
        '<span class="guides-featured-label">Featured Guide</span>' +
        '<h2>' + esc(f.t) + '</h2>' +
        '<p>Learn how to build this Make.com automation step by step. Follow along with our detailed tutorial and have it running in minutes.</p>' +
        '<span class="guides-featured-link">Read the guide ' + arrowSvg + '</span>' +
      '</div>';
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function createCard(item) {
    var a = document.createElement('a');
    a.className = 'guide-card';
    a.href = item.u;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML =
      '<div class="guide-card-img-wrap">' +
        '<img class="guide-card-img" src="' + item.i + '?tr=w-400,h-250,q-75" alt="' + esc(item.t) + ' — Make.com Guide" width="400" height="250" loading="lazy">' +
      '</div>' +
      '<div class="guide-card-body">' +
        '<div class="guide-card-meta">Tutorial<span class="guide-card-meta-dot"></span>Make.com</div>' +
        '<h3 class="guide-card-title">' + esc(item.t) + '</h3>' +
        '<span class="guide-card-read">Read guide ' + arrowSvg + '</span>' +
      '</div>';
    return a;
  }

  function render() {
    grid.innerHTML = '';
    var items = filtered.slice(0, visible);

    if (items.length === 0) {
      grid.innerHTML = '<div class="guides-empty"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607z"/></svg><p>No guides found. Try a different search term.</p></div>';
    } else {
      for (var i = 0; i < items.length; i++) {
        grid.appendChild(createCard(items[i]));
      }
    }

    var q = searchInput.value.trim();
    if (q) {
      resultsEl.textContent = filtered.length + ' guide' + (filtered.length !== 1 ? 's' : '') + ' found';
      sectionTitle.textContent = 'Search Results';
      featuredSection.style.display = 'none';
    } else {
      resultsEl.textContent = 'Showing ' + Math.min(visible, filtered.length) + ' of ' + filtered.length;
      sectionTitle.textContent = 'All Guides';
      featuredSection.style.display = '';
    }

    moreWrap.style.display = visible < filtered.length ? 'block' : 'none';
  }

  function onSearch() {
    var q = searchInput.value.trim().toLowerCase();
    if (!q) {
      filtered = ALL_WORKFLOWS.slice();
    } else {
      filtered = ALL_WORKFLOWS.filter(function(item) {
        return item.t.toLowerCase().indexOf(q) !== -1;
      });
    }
    visible = PER_PAGE;
    render();
  }

  var timer;
  searchInput.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(onSearch, 250);
  });

  moreBtn.addEventListener('click', function() {
    visible += PER_PAGE;
    render();
  });

  /* Init */
  renderFeatured();
  filtered = ALL_WORKFLOWS.slice();
  visible = PER_PAGE;
  render();
})();
</script>

</body>
