<style>
:root {
  --wf-primary: #059669;
  --wf-primary-light: #d1fae5;
  --wf-bg: #f8fafc;
  --wf-card-bg: #ffffff;
  --wf-border: #e2e8f0;
  --wf-text: #1e293b;
  --wf-text-muted: #64748b;
  --font-body: 'Plus Jakarta Sans', sans-serif;
  --font-display: 'Bricolage Grotesque', serif;
}

/* Hero */
.wf-hero {
  padding: 80px 24px 36px;
  text-align: center;
  background: linear-gradient(180deg, var(--wf-primary-light) 0%, var(--wf-bg) 100%);
}
.wf-hero h1 {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 800;
  color: var(--wf-text);
  margin: 0 0 12px;
  line-height: 1.2;
}
.wf-hero p {
  font-size: 17px;
  color: var(--wf-text-muted);
  max-width: 560px;
  margin: 0 auto 28px;
  line-height: 1.6;
}
.wf-count {
  display: inline-block;
  background: var(--wf-primary);
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 16px;
}

/* Search */
.wf-search-wrap {
  max-width: 520px;
  margin: 0 auto;
  position: relative;
}
.wf-search-wrap svg {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--wf-text-muted);
}
.wf-search {
  width: 100%;
  padding: 14px 16px 14px 44px;
  border: 1px solid var(--wf-border);
  border-radius: 12px;
  font-size: 15px;
  font-family: var(--font-body);
  background: var(--wf-card-bg);
  color: var(--wf-text);
  outline: none;
  transition: border-color .2s;
}
.wf-search:focus {
  border-color: var(--wf-primary);
  box-shadow: 0 0 0 3px rgba(5,150,105,.12);
}

/* Grid */
.wf-section {
  padding: 32px 24px 64px;
  background: var(--wf-bg);
}
.wf-inner {
  max-width: 1200px;
  margin: 0 auto;
}
.wf-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

/* Card — compact */
.wf-card {
  display: block;
  background: var(--wf-card-bg);
  border: 1px solid var(--wf-border);
  border-radius: 10px;
  overflow: hidden;
  text-decoration: none;
  color: var(--wf-text);
  transition: transform .2s, box-shadow .2s, border-color .2s;
}
.wf-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.08);
  border-color: var(--wf-primary);
}
.wf-card-img {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
  display: block;
  background: #f1f5f9;
}
.wf-card-body {
  padding: 10px 12px 12px;
}
.wf-card-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--wf-text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin: 0;
}

/* Show More */
.wf-more-wrap {
  text-align: center;
  margin-top: 32px;
}
.wf-more-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  background: var(--wf-primary);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.wf-more-btn:hover {
  background: #047857;
  transform: translateY(-1px);
}
.wf-more-btn:disabled {
  opacity: .5;
  cursor: default;
  transform: none;
}
.wf-more-btn svg {
  width: 16px; height: 16px;
}

/* Results count */
.wf-results {
  font-size: 14px;
  color: var(--wf-text-muted);
  margin-bottom: 16px;
}

/* Empty state */
.wf-empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--wf-text-muted);
  font-size: 15px;
}
.wf-empty svg {
  width: 48px; height: 48px; margin-bottom: 12px; opacity: .4;
}

/* Responsive */
@media (max-width: 900px) {
  .wf-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 640px) {
  .wf-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .wf-card-title { font-size: 12px; }
  .wf-card-body { padding: 8px 10px 10px; }
  .wf-hero { padding: 100px 16px 32px; }
}

<!-- Workflow Data & Logic -->
 <script src="/workflows/workflows-posts.js"></script>

<script>
(function() {
  'use strict';

  var CARDS_PER_PAGE = 12;
  var visibleCount = 0;

  // All workflow data
  

  var filtered = ALL_WORKFLOWS.slice();
  var grid = document.getElementById('wfGrid');
  var moreBtn = document.getElementById('wfMoreBtn');
  var moreWrap = document.getElementById('wfMoreWrap');
  var resultsEl = document.getElementById('wfResults');
  var emptyEl = document.getElementById('wfEmpty');
  var searchInput = document.getElementById('wfSearch');

  function slugToAlt(title) {
    return title + ' — n8n Workflow Template';
  }

  function createCard(item) {
    var a = document.createElement('a');
    a.className = 'wf-card';
    a.href = item.u;
    a.target = '_blank';
    a.rel = 'noopener';

    a.innerHTML =
      '<img class="wf-card-img" src="' + item.i + '?tr=w-400,h-250,q-75" alt="' + slugToAlt(item.t).replace(/"/g, '&quot;') + '" width="400" height="250" loading="lazy">' +
      '<div class="wf-card-body"><p class="wf-card-title">' + item.t + '</p></div>';

    return a;
  }

  function render() {
    grid.innerHTML = '';
    var toShow = filtered.slice(0, visibleCount);

    for (var i = 0; i < toShow.length; i++) {
      grid.appendChild(createCard(toShow[i]));
    }

    // Results text
    if (searchInput.value.trim()) {
      resultsEl.textContent = filtered.length + ' workflow' + (filtered.length !== 1 ? 's' : '') + ' found';
    } else {
      resultsEl.textContent = 'Showing ' + Math.min(visibleCount, filtered.length) + ' of ' + filtered.length + ' workflows';
    }

    // Empty state
    emptyEl.style.display = filtered.length === 0 ? 'block' : 'none';

    // Show more button
    moreWrap.style.display = visibleCount < filtered.length ? 'block' : 'none';
  }

  function onSearch() {
    var q = searchInput.value.trim().toLowerCase();
    if (!q) {
      filtered = ALL_WORKFLOWS.slice();
    } else {
      filtered = ALL_WORKFLOWS.filter(function(item) {
        return item.t.toLowerCase().indexOf(q) !== -1;
      });
    }
    visibleCount = CARDS_PER_PAGE;
    render();
  }

  function onMore() {
    visibleCount += CARDS_PER_PAGE;
    render();
  }

  // Debounce
  var timer;
  searchInput.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(onSearch, 250);
  });

  moreBtn.addEventListener('click', onMore);

  // Initial render
  visibleCount = CARDS_PER_PAGE;
  render();
})();
// Set dynamic count (rounded down to nearest 50)
var total = ALL_WORKFLOWS.length;
var rounded = Math.floor(total / 50) * 50;
document.getElementById('wf-Count').textContent = rounded + '+ Templates';

// Initial render
visibleCount = CARDS_PER_PAGE;
render();

</script>
